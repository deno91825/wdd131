<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form for WDD 131 – Dynamic Web Fundamentals">
    <meta name="author" content="Oweki Denis">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">

    <!-- JS -->
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/form.js" defer></script>

    <title>WDD 131 – Product Review – Oweki Denis</title>
</head>

<body>

    <header>
         <h1>Product Review</h1>
    </header>

<main>
   

    <form method="get" action="review.html">

        <!-- Product -->
        <label for="product">Product Name</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- Rating -->
        <fieldset>
           <input type="radio" id="rating1" name="rating" value="1" required>
            <label for="rating1">☆</label>

            <input type="radio" id="rating2" name="rating" value="2" required>
            <label for="rating2">☆☆</label>

            <input type="radio" id="rating3" name="rating" value="3" required>
            <label for="rating3">☆☆☆</label>

            <input type="radio" id="rating4" name="rating" value="4" required>
            <label for="rating4">☆☆☆☆</label>

            <input type="radio" id="rating5" name="rating" value="5" required>
            <label for="rating5">☆☆☆☆☆</label>
        </fieldset>

        <!-- Date -->
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <!-- Features -->
        <fieldset>
            <legend>Useful Features (Check all that apply)</legend>
            <input type="checkbox" id="featureDurability" name="features" value="Durability">
            <label for="featureDurability">Durability</label>

            <input type="checkbox" id="featureEase" name="features" value="Ease of Use">
            <label for="featureEase">Ease of Use</label>

            <input type="checkbox" id="featurePerformance" name="features" value="Performance">
            <label for="featurePerformance">Performance</label>

            <input type="checkbox" id="featureDesign" name="features" value="Design">
            <label for="featureDesign">Design</label>
        </fieldset>

        <!-- Review -->
        <label for="review">Written Review (Optional)</label>
        <textarea id="review" name="review"></textarea>

        <!-- Name -->
        <label for="username">Your Name (Optional)</label>
        <input type="text" id="username" name="username">

        <!-- Submit -->
        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p><span id="currentyear"></span> Oweki Denis, Uganda</p>
    <p id="lastmodified"></p>
</footer>

</body>
</html>
