<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selfless CE is a non-profit organization supporting BYU Pathway students in Uganda through education and empowerment.">
    <meta name="author" content="Denis Oweki">
    <title>Selfless CE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <script src="scripts/main.js" defer></script>
    <script src="scripts/last-updated.js" defer></script>
    <script src="scripts/about.js" defer></script>
    <script src="scripts/contact.js" defer></script>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            <img src="images/SelflessLogo.png" alt="Selfless CE Logo">
            <span>Selfless CE</span>
        </div>

    <button class="menu-toggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
     <main>

        <!-- HERO -->
        <section class="hero" style="height: 50vh;">
            <div class="overlay"></div>
            <div class="hero-content">
                <h1>Contact Us</h1>
            </div>
        </section>

        <!-- FORM SECTION -->
        <section class="contact-section">

            <div class="contact-container">

                <h2>Get in Touch</h2>

                <form id="contact-form">

                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit" class="btn primary">Send Message</button>

                </form>

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>

        <!-- TOP ROW -->
        <div class="footer-top">
            <div class="social-icons">
                <a href="https://facebook.com" target="_blank">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>

                <a href="https://twitter.com" target="_blank">
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

                <a href="https://wa.me/0787918190" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            </div>

            <div class="ngo-name">
                Selfless CE
            </div>
        </div>

        <!-- MIDDLE -->
        <div class="footer-middle">
            🇺🇬 ❤️ 😊 By Denis Oweki 😊 ❤️ 🇺🇬
        </div>

        <!-- BOTTOM RIGHT -->
        <div class="footer-bottom">
            <span id="last-updated">Last Updated:</span>
        </div>

    </footer>

</body>
</html>
