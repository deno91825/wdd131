<!DOCTYPE html>

    <meta name="description" content="Lazy loading images practice page">

        <figure>
            <img src="images/download5.jpg" alt="Temple of Hephaestus" loading="lazy">

        </figure>

        <figure>
            <img src="images/download6.jpg" alt="Temple of Poseidon" loading="lazy">
